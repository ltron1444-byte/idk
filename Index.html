<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chetan Games</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #f9fafb, #f1f5f9);
}

/* TITLE */
.title-wrap {
    display: flex;
    justify-content: center;
    margin-top: 40px;
}
.title-box {
    padding: 15px 40px;
    border-radius: 30px;
    background: white;
    border: 2px solid #eab308;
    font-size: 40px;
    font-weight: bold;
    color: #eab308;
    animation: breathe 3s ease-in-out infinite;
}
@keyframes breathe {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.03); }
}

.subtitle {
    text-align: center;
    font-weight: bold;
    margin: 10px 0 30px;
}

/* SEARCH */
.controls {
    display: flex;
    justify-content: center;
}
.controls input {
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ccc;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 130px);
    gap: 15px;
    justify-content: center;
    padding: 40px;
}

.card {
    background: white;
    border-radius: 12px;
    border: 2px solid #ddd;
    cursor: pointer;
    transition: 0.2s;
}
.card:hover {
    transform: scale(1.05);
    border-color: #eab308;
}

.card p {
    text-align: center;
    font-size: 12px;
    padding: 10px;
}

/* VIEWER */
#viewer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
    flex-direction: column;
}

#gameFrame {
    width: 100%;
    height: 100%;
    border: none;
}

#closeBtn {
    background: red;
    color: white;
    padding: 10px;
    text-align: center;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="title-wrap">
    <div class="title-box">Chetan Games</div>
</div>

<div class="subtitle">Best Gaming Website Ever</div>

<div class="controls">
    <input id="search" placeholder="Search games...">
</div>

<div class="grid" id="grid"></div>

<div id="viewer">
    <div id="closeBtn" onclick="closeGame()">Close</div>
    <iframe id="gameFrame"></iframe>
</div>

<script>
const games = [
 {name:"Geometry Dash", folder:"geometrydash"},
 {name:"Attack Hole", folder:"attackhole"},
 {name:"BitLife", folder:"bitlife"},
 {name:"Baldi's Basics", folder:"baldisbasics"},
 {name:"A Dance of Fire and Ice", folder:"adofai"},
 {name:"Granny", folder:"granny"},
 {name:"GunSpin", folder:"gunspin"},
 {name:"Space Waves", folder:"spacewaves"},
 {name:"Snow Rider 3D", folder:"snowrider3d"},
 {name:"Crazy Cattle 3D", folder:"crazycattle3d"},
 {name:"Bad Parenting", folder:"badparenting"},
 {name:"SUPERHOT", folder:"superhot"},
 {name:"Don't You Lecture Me", folder:"dontyoulectureme"},
 {name:"Stickman Hook", folder:"stickmanhook"},
 {name:"1v1.lol", folder:"1v1lol"},
 {name:"BuildNow.gg", folder:"buildnowgg"}
];

const grid = document.getElementById("grid");

/* RENDER GAMES */
games.forEach(game=>{
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<p>${game.name}</p>`;
    card.onclick = ()=>openGame(game.folder);
    grid.appendChild(card);
});

/* SEARCH */
document.getElementById("search").addEventListener("input", ()=>{
    const val = document.getElementById("search").value.toLowerCase();
    document.querySelectorAll(".card").forEach(card=>{
        card.style.display = card.innerText.toLowerCase().includes(val) ? "block" : "none";
    });
});

/* OPEN GAME */
function openGame(folder){
    document.getElementById("viewer").style.display = "flex";
    document.getElementById("gameFrame").src = "games/" + folder + "/index.html";
}

/* CLOSE */
function closeGame(){
    document.getElementById("viewer").style.display = "none";
    document.getElementById("gameFrame").src = "";
}
</script>

</body>
</html>
